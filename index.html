<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mineradio Mobile - 沉浸式粒子电台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --blur-bg: rgba(255, 255, 255, 0.06);
            --border-line: rgba(255, 255, 255, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }

        /* 3D 背景画布 */
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* iOS 首次交互解锁遮罩层 */
        #unlock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .unlock-btn {
            padding: 16px 36px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
            cursor: pointer;
            transform: scale(1);
            transition: transform 0.2s;
        }
        .unlock-btn:active { transform: scale(0.95); }

        /* 主 UI 容器 */
        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(var(--safe-top) + 20px) 24px calc(var(--safe-bottom) + 24px) 24px;
            pointer-events: none; /* 让层透明，允许手势滑动 3D 场景 */
        }

        .ui-element { pointer-events: auto; } /* 恢复 UI 控件的点击 */

        /* 头部：歌曲信息 */
        header {
            text-align: center;
            backdrop-filter: blur(10px);
            background: var(--blur-bg);
            border: 1px solid var(--border-line);
            padding: 16px;
            border-radius: 20px;
        }
        header h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
        header p { font-size: 0.85rem; color: #b3b3b3; }

        /* 中部：沉浸式歌词舞台 */
        .lyrics-container {
            flex-grow: 1;
            margin: 40px 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent 0%, white 25%, white 75%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, white 25%, white 75%, transparent 100%);
        }

        .lyrics-wrapper {
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            text-align: center;
            width: 100%;
        }

        .lyric-line {
            padding: 12px 10px;
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            transform: scale(0.95);
        }

        .lyric-line.active {
            color: #ffffff;
            font-weight: 600;
            transform: scale(1.08);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        /* 底部控制面板 */
        .controls-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: var(--blur-bg);
            border: 1px solid var(--border-line);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
        }

        /* 进度条 */
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #a0a0a0;
            margin-bottom: 15px;
        }
        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 12px;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #ffffff;
            border-radius: 2px;
        }

        /* 按钮组 */
        .btn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.8;
        }
        .icon-btn:active { opacity: 0.5; }

        .play-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #ffffff;
            color: #000000;
            font-size: 1.4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        /* 天气侧滑抽屉面板 */
        #weather-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 25, 0.92);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-line);
            border-radius: 24px 24px 0 0;
            z-index: 100;
            padding: 24px;
            padding-bottom: calc(var(--safe-bottom) + 20px);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #weather-drawer.open { transform: translateY(0); }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .weather-mix-row {
            margin-bottom: 16px;
        }
        .weather-mix-row label {
            display: block;
            font-size: 0.85rem;
            color: #b3b3b3;
            margin-bottom: 6px;
        }
        .weather-slider {
            width: 100%;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
        }
        .weather-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
        }

        /* 隐藏原生文件上传按钮样式 */
        #file-upload { display: none; }
    </style>
</head>
<body>

    <div id="unlock-overlay">
        <h2 style="margin-bottom: 30px; font-weight: 300; letter-spacing: 4px;">MINERADIO</h2>
        <button class="unlock-btn" onclick="initAudioSpace()">开启沉浸空间</button>
    </div>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-container">
        <header class="ui-element">
            <h1 id="track-title">未载入音频</h1>
            <p id="track-artist">请点击下方文件夹导入音乐与歌词</p>
        </header>

        <div class="lyrics-container">
            <div class="lyrics-wrapper" id="lyrics-wrapper">
                <div class="lyric-line active">Mineradio 空间就绪</div>
                <div class="lyric-line">导入本地音乐与 LRC 文本开启完美同步</div>
            </div>
        </div>

        <div class="controls-panel ui-element">
            <div class="progress-container">
                <span id="current-time">00:00</span>
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span id="total-time">00:00</span>
            </div>

            <div class="btn-row">
                <label for="file-upload" class="icon-btn" style="cursor: pointer;">📁</label>
                <input type="file" id="file-upload" accept="audio/*">

                <button class="icon-btn play-btn" id="play-btn">▶</button>

                <button class="icon-btn" onclick="toggleWeather(true)">🌧️</button>
            </div>
        </div>
    </div>

    <div id="weather-drawer">
        <div class="drawer-header">
            <h3>环境自然音微调</h3>
            <button class="icon-btn" onclick="toggleWeather(false)">✕</button>
        </div>
        <div class="weather-mix-row">
            <label>阿尔卑斯细雨 (Rain Noise)</label>
            <input type="range" class="weather-slider" id="rain-vol" min="0" max="1" step="0.01" value="0">
        </div>
        <div class="weather-mix-row">
            <label>西伯利亚狂风 (Wind Synthesizer)</label>
            <input type="range" class="weather-slider" id="wind-vol" min="0" max="1" step="0.01" value="0">
        </div>
    </div>

    <script>
        // --- 全局变量配置 ---
        let audioCtx, mainAudio, audioSource, analyser, dataArray;
        let isPlaying = false;
        let lyricsArray = [];
        let currentLineIndex = -1;

        // 天气合成节点
        let rainNode, windNode;
        let rainGain, windGain;

        // Three.js 变量
        let scene, camera, renderer, particleSystem;
        let mouseX = 0, mouseY = 0;

        // --- 1. 初始化 Web Audio 空间（iOS 触发） ---
        function initAudioSpace() {
            // 创建 AudioContext
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 初始化主音乐 HTML5 Audio 标签
            mainAudio = new Audio();
            mainAudio.loop = true;
            mainAudio.crossOrigin = "anonymous";

            // 绑定分析器
            audioSource = audioCtx.createMediaElementSource(mainAudio);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            audioSource.connect(analyser);
            analyser.connect(audioCtx.destination);

            // 算法合成天气背景音
            setupWeatherSynthesizer();

            // 隐藏解锁层
            document.getElementById('unlock-overlay').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('unlock-overlay').style.display = 'none';
            }, 800);

            // 开启动画与系统循环
            initThree();
            setupEventListeners();
            animate();
        }

        // --- 2. 纯代码算法合成天气环境音（不依赖外链音频文件） ---
        function setupWeatherSynthesizer() {
            // 创建白噪声 Buffer 缓存
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            // A. 雨声生成：白噪声 + 低通滤波器
            const rainSource = audioCtx.createBufferSource();
            rainSource.buffer = noiseBuffer;
            rainSource.loop = true;
            
            const rainFilter = audioCtx.createBiquadFilter();
            rainFilter.type = 'lowpass';
            rainFilter.frequency.setValueAtTime(1200, audioCtx.currentTime);

            rainGain = audioCtx.createGain();
            rainGain.gain.setValueAtTime(0, audioCtx.currentTime);

            rainSource.connect(rainFilter);
            rainFilter.connect(rainGain);
            rainGain.connect(audioCtx.destination);
            rainSource.start();

            // B. 风声生成：白噪声 + 动态带通滤波器 + 动态频率 LFO 产生呼啸感
            const windSource = audioCtx.createBufferSource();
            windSource.buffer = noiseBuffer;
            windSource.loop = true;

            const windFilter = audioCtx.createBiquadFilter();
            windFilter.type = 'bandpass';
            windFilter.Q.setValueAtTime(4.0, audioCtx.currentTime);

            // 使用低频振荡器（LFO）模拟风的呼啸起伏
            const lfo = audioCtx.createOscillator();
            lfo.frequency.setValueAtTime(0.15, audioCtx.currentTime); // 每秒震荡 0.15 次
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.setValueAtTime(350, audioCtx.currentTime); // 改变频率幅度幅度

            lfo.connect(lfoGain);
            lfoGain.connect(windFilter.frequency);
            windFilter.frequency.setValueAtTime(450, audioCtx.currentTime);

            windGain = audioCtx.createGain();
            windGain.gain.setValueAtTime(0, audioCtx.currentTime);

            windSource.connect(windFilter);
            windFilter.connect(windGain);
            windGain.connect(audioCtx.destination);
            
            lfo.start();
            windSource.start();
        }

        // --- 3. 初始化 Three.js 3D 梦幻粒子星空 ---
        function initThree() {
            const canvas = document.getElementById('webgl-canvas');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050508, 0.0015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 500;

            // 创建星海粒子群
            const particleCount = 1200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                // 空间随机分布
                positions[i] = (Math.random() - 0.5) * 1000;
                positions[i+1] = (Math.random() - 0.5) * 1000;
                positions[i+2] = (Math.random() - 0.5) * 1000;

                // 荧光淡紫/科技蓝渐变色
                colors[i] = 0.5 + Math.random() * 0.5;
                colors[i+1] = 0.6 + Math.random() * 0.4;
                colors[i+2] = 1.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // 精灵贴图材质
            const material = new THREE.PointsMaterial({
                size: 3.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            // 渲染器配置
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        }

        // --- 4. 实时动画渲染（与音乐频谱共振律动） ---
        function animate() {
            requestAnimationFrame(animate);

            // 获取电平频率数据
            let audioScale = 1;
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                // 提取中低音域平均能量
                let lowFreqSum = 0;
                for(let i=0; i<15; i++) lowFreqSum += dataArray[i];
                audioScale = 1 + (lowFreqSum / 15 / 255) * 1.5; // 计算膨胀系数
            }

            // 粒子缓速旋转与动感反馈
            particleSystem.rotation.y += 0.001;
            particleSystem.rotation.x += 0.0005;
            
            // 粒子尺寸随着音乐节拍整体共振
            particleSystem.material.size = 3.0 * audioScale;

            // 手机重力感应滑动微调视角
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        // --- 5. 歌词解析引擎 (LRC 格式格式化) ---
        function parseLRC(lrcText) {
            const lines = lrcText.split('\n');
            const result = [];
            const timeReg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;

            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const msStr = match[3];
                    const milliseconds = parseInt(msStr) * (msStr.length === 2 ? 10 : 1);
                    const time = minutes * 60 + seconds + milliseconds / 1000;
                    const text = line.replace(timeReg, '').trim();
                    if(text) result.push({ time, text });
                }
            });
            // 按照时间戳升序排序
            result.sort((a, b) => a.time - b.time);
            return result;
        }

        function updateLyricsDisplay() {
            if (!lyricsArray.length) return;
            const currentTime = mainAudio.currentTime;
            
            let activeIndex = -1;
            for (let i = 0; i < lyricsArray.length; i++) {
                if (currentTime >= lyricsArray[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }

            if (activeIndex !== -1 && activeIndex !== currentLineIndex) {
                currentLineIndex = activeIndex;
                renderLyricsDOM();
            }
        }

        function renderLyricsDOM() {
            const container = document.getElementById('lyrics-wrapper');
            container.innerHTML = '';
            
            // 前后缓冲显示 3 行，提供沉浸滚动视觉
            const start = Math.max(0, currentLineIndex - 2);
            const end = Math.min(lyricsArray.length - 1, currentLineIndex + 3);

            // 计算垂直滑动平移
            const offset = -currentLineIndex * 42; 
            container.style.transform = `translateY(${offset + 80}px)`;

            lyricsArray.forEach((line, index) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = `lyric-line ${index === currentLineIndex ? 'active' : ''}`;
                lineDiv.innerText = line.text;
                container.appendChild(lineDiv);
            });
        }

        // --- 6. 事件触发与绑定控制 ---
        function setupEventListeners() {
            const playBtn = document.getElementById('play-btn');
            const fileUpload = document.getElementById('file-upload');
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');

            // 播放与暂停切换
            playBtn.addEventListener('click', () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                if (isPlaying) {
                    mainAudio.pause();
                    playBtn.innerText = '▶';
                } else {
                    mainAudio.play();
                    playBtn.innerText = '⏸';
                }
                isPlaying = !isPlaying;
            });

            // 实时同步音频播放进度
            mainAudio.addEventListener('timeupdate', () => {
                const curr = mainAudio.currentTime;
                const duration = mainAudio.duration || 0;
                
                document.getElementById('current-time').innerText = formatTime(curr);
                document.getElementById('total-time').innerText = formatTime(duration);
                
                if(duration > 0) {
                    progressFill.style.width = `${(curr / duration) * 100}%`;
                }
                updateLyricsDisplay();
            });

            // 手势快进调节进度
            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                if(mainAudio.duration) {
                    mainAudio.currentTime = (clickX / width) * mainAudio.duration;
                }
            });

            // 本地音视频导入与自动提取歌词
            fileUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                document.getElementById('track-title').innerText = file.name.replace(/\.[^/.]+$/, "");
                document.getElementById('track-artist').innerText = "本地导入空间";

                const fileURL = URL.createObjectURL(file);
                mainAudio.src = fileURL;
                
                // 默认内置一套通用的测试交互歌词，防止没有加载LRC时显示空白
                lyricsArray = [
                    { time: 0, text: "✨ 已成功加载本地音频空间" },
                    { time: 3, text: "🎵 感受高维度环境音的碰撞" },
                    { time: 7, text: "🌧️ 打开右下角面板加入自然混音" },
                    { time: 15, text: "🚀 闭上双眼，进入无限冥想状态..." }
                ];
                currentLineIndex = -1;
                renderLyricsDOM();

                mainAudio.play();
                playBtn.innerText = '⏸';
                isPlaying = true;
            });

            // 天气混音滑块控制
            document.getElementById('rain-vol').addEventListener('input', (e) => {
                if(rainGain) rainGain.gain.linearRampToValueAtTime(parseFloat(e.target.value) * 0.4, audioCtx.currentTime + 0.1);
            });
            document.getElementById('wind-vol').addEventListener('input', (e) => {
                if(windGain) windGain.gain.linearRampToValueAtTime(parseFloat(e.target.value) * 0.3, audioCtx.currentTime + 0.1);
            });

            // 手机触摸互动：滑动屏幕使 3D 粒子偏移转动
            window.addEventListener('touchmove', (e) => {
                if(e.touches.length > 0) {
                    mouseX = (e.touches[0].clientX - window.innerWidth / 2) * 0.5;
                    mouseY = (e.touches[0].clientY - window.innerHeight / 2) * 0.5;
                }
            });

            // 监听屏幕缩放适配适配
            window.addEventListener('resize', () => {
                if(!camera) return;
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // 抽屉管理
        function toggleWeather(open) {
            document.getElementById('weather-drawer').classList.toggle('open', open);
        }

        // 时间格式化辅助
        function formatTime(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }
    </script>
</body>
</html>
