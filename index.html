  <!-- 全局配置与高级视觉层样式 -->
  <style>
    /* 极致垂直双向羽化歌词遮罩 - 营造电影级消隐 */
    .mask-lyric-vertical {
      mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);
    }
    
    /* 高端 iOS 进度条 thumb 悬浮特效 */
    .slider-thumb::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #ffffff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
      margin-top: -5px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .slider-thumb::-webkit-slider-thumb:active {
      transform: scale(1.6);
      box-shadow: 0 0 20px rgba(255, 255, 255, 1);
    }
    .slider-thumb::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 99px;
    }
    
    /* 模拟电影镜头背景微摇 */
    @keyframes cinematicSlowPan {
      0% { transform: scale(1.12) translate(0px, 0px) rotate(0deg); }
      25% { transform: scale(1.18) translate(-15px, 10px) rotate(0.5deg); }
      50% { transform: scale(1.22) translate(10px, -15px) rotate(-0.5deg); }
      75% { transform: scale(1.18) translate(-10px, -10px) rotate(0.3deg); }
      100% { transform: scale(1.12) translate(0px, 0px) rotate(0deg); }
    }
    .cinematic-bg-anim {
      animation: cinematicSlowPan 45s ease-in-out infinite;
    }
    
    /* 隐藏原生滚动条 */
    .hide-scroll::-webkit-scrollbar {
      display: none;
    }
    .hide-scroll {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* 仿 iPhone 灵动岛声音波形动画 */
    @keyframes waveAmbient {
      0%, 100% { height: 4px; }
      50% { height: 16px; }
    }
    .wave-bar {
      animation: waveAmbient 1.2s ease-in-out infinite;
    }
  </style>
</head>

    // ==========================================
    // --- Canvas 粒子环境音效视觉核心 ---
    // ==========================================
    const DynamicCanvasEngine = ({ isPlaying, isWeatherOn, activePreset, presetParams }) => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationFrameId;

        let particles = [];
        let rainDrops = [];

        const handleResize = () => {
          canvas.width = canvas.parentElement.clientWidth || window.innerWidth;
          canvas.height = canvas.parentElement.clientHeight || window.innerHeight;
        };
        window.addEventListener('resize', handleResize);
        handleResize();

        const setupParticles = () => {
          particles = [];
          const count = presetParams.particleCount || activePreset.particleCount;
          for (let i = 0; i < count; i++) {
            particles.push({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              radius: Math.random() * 2.2 + 0.4,
              vx: (Math.random() - 0.5) * 0.4,
              vy: (Math.random() - 1) * 0.5 - 0.1,
              alpha: Math.random() * 0.6 + 0.1,
              pulse: Math.random() * 0.02
            });
          }
        };

        const setupRain = () => {
          rainDrops = [];
          for (let i = 0; i < 90; i++) {
            rainDrops.push({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              length: Math.random() * 25 + 12,
              vy: Math.random() * 12 + 16,
              alpha: Math.random() * 0.18 + 0.04
            });
          }
        };

        setupParticles();
        setupRain();

        const renderLoop = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const isPlaySpeed = isPlaying ? (presetParams.particleSpeed || activePreset.particleSpeed) : 0.2;

          particles.forEach(p => {
            p.x += p.vx * isPlaySpeed * 3;
            p.y += p.vy * isPlaySpeed * 3;
            p.alpha += p.pulse;
            if (p.alpha > 0.8 || p.alpha < 0.1) p.pulse = -p.pulse;

            if (p.y < 0) { p.y = canvas.height; p.x = Math.random() * canvas.width; }
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            
            const glow = presetParams.glowIntensity || activePreset.glowIntensity;
            ctx.shadowBlur = glow;
            ctx.shadowColor = presetParams.particleColor || activePreset.particleColor;
            ctx.fillStyle = presetParams.particleColor || activePreset.particleColor;
            ctx.fill();
          });

          if (isWeatherOn) {
            ctx.shadowBlur = 0;
            rainDrops.forEach(drop => {
              drop.y += drop.vy * (isPlaying ? 1.0 : 0.25);
              if (drop.y > canvas.height) {
                drop.y = -drop.length;
                drop.x = Math.random() * canvas.width;
              }
              ctx.beginPath();
              ctx.moveTo(drop.x, drop.y);
              ctx.lineTo(drop.x + 1, drop.y + drop.length);
              ctx.strokeStyle = `rgba(255, 255, 255, ${drop.alpha})`;
              ctx.lineWidth = 1.2;
              ctx.stroke();
            });
          }

          animationFrameId = window.requestAnimationFrame(renderLoop);
        };

        renderLoop();

        return () => {
          window.removeEventListener('resize', handleResize);
          window.cancelAnimationFrame(animationFrameId);
        };
      }, [isPlaying, isWeatherOn, activePreset, presetParams]);

      return <canvas ref={canvasRef} className="absolute inset-0 pointer-events-none z-10" />;
    };

    // ==========================================
    // --- 主应用: Mineradio Mobile Engine ---
    // ==========================================

      const [isWeatherOn, setIsWeatherOn] = useState(false);

      const [searchQuery, setSearchQuery] = useState("");
      const [qqCookie, setQqCookie] = useState("");
      const [showCookie, setShowCookie] = useState(false);
      const [isLoggedIn, setIsLoggedIn] = useState(false);

      const [activePreset, setActivePreset] = useState(VISUAL_PRESETS[0]);
      const [presetParams, setPresetParams] = useState({
        particleColor: "rgba(255, 255, 255, 0.5)",
        particleCount: 50,
        particleSpeed: 1.0,
        blurIntensity: 60,
        rotateSpeed: 4,
        glowIntensity: 15,
        fontSize: 20,
        alignCenter: true,
        showTranslation: true
      });

      const audioRef = useRef(null);
      const touchStartRef = useRef(0);
      const touchEndRef = useRef(0);

      const currentSong = playlist[currentIndex] || DEFAULT_PLAYLIST[0];

      useEffect(() => {
        if (audioRef.current) {
          audioRef.current.src = currentSong.audioUrl;
          audioRef.current.load();
          if (isPlaying) {
            audioRef.current.play().catch(() => setIsPlaying(false));
          }
        }
        setProgress(0);
        setCurrentTime(0);
      }, [currentIndex, playlist]);

      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;

        const onTimeUpdate = () => {
          if (audio.duration) {
            setCurrentTime(audio.currentTime);
            setProgress((audio.currentTime / audio.duration) * 100);
          }
        };

        const onLoadedMetadata = () => {
          setDuration(audio.duration || 30);
        };

        const onAudioEnded = () => {
          handleNext();
        };

        audio.addEventListener('timeupdate', onTimeUpdate);
        audio.addEventListener('loadedmetadata', onLoadedMetadata);
        audio.addEventListener('ended', onAudioEnded);

        return () => {
          audio.removeEventListener('timeupdate', onTimeUpdate);
          audio.removeEventListener('loadedmetadata', onLoadedMetadata);
          audio.removeEventListener('ended', onAudioEnded);
        };
      }, [currentIndex, playlist]);

      useEffect(() => {
        if (!audioRef.current) return;
        if (isPlaying) {
          audioRef.current.play().catch(() => setIsPlaying(false));
        } else {
          audioRef.current.pause();
        }
      }, [isPlaying]);

      const handleNext = () => {
        setCurrentIndex((prev) => (prev + 1) % playlist.length);
      };

      const handlePrev = () => {
        setCurrentIndex((prev) => (prev - 1 + playlist.length) % playlist.length);
      };

      const handleTouchStart = (e) => {
        touchStartRef.current = e.targetTouches[0].clientX;
      };

      const handleTouchMove = (e) => {
        touchEndRef.current = e.targetTouches[0].clientX;
      };

      const handleTouchEnd = () => {
        const diff = touchStartRef.current - touchEndRef.current;
        if (Math.abs(diff) > 55) {
          if (diff > 0) {
            handleNext();
          } else {
            handlePrev();
          }
        }
      };

      const handleProgressChange = (e) => {
        const val = Number(e.target.value);
        setProgress(val);
        if (audioRef.current && duration) {
          audioRef.current.currentTime = (val / 100) * duration;
        }
      };

      const selectPreset = (preset) => {
        setActivePreset(preset);
        setPresetParams(prev => ({
          ...prev,
          particleColor: preset.particleColor,
          particleCount: preset.particleCount,
          particleSpeed: preset.particleSpeed,

                    <div className="space-y-1.5">
                      <div className="flex justify-between text-xs">
                        <span className="text-white/60">主歌词字号大小</span>
                        <span className="font-mono text-white/80">{presetParams.fontSize}px</span>
                      </div>
                      <input 
                        type="range" min="16" max="28" 
                        value={presetParams.fontSize}
                        onChange={(e) => setPresetParams({...presetParams, fontSize: Number(e.target.value)})}
                        className="w-full slider-thumb appearance-none bg-neutral-800 h-1 rounded"
                      />
                    </div>
                    
                    <div className="flex items-center justify-between pt-2">
                      <span className="text-xs text-white/60">居中排版方式</span>
                      <button 
                        onClick={() => setPresetParams({...presetParams, alignCenter: !presetParams.alignCenter})}
                        className={`px-3 py-1.5 rounded-lg text-xs transition-colors ${
                          presetParams.alignCenter ? 'bg-white/10 text-white border border-white/20' : 'bg-neutral-800 text-neutral-400'
                        }`}
                      >
                        {presetParams.alignCenter ? '居中对齐' : '左侧对齐'}
                      </button>
                    </div>

                    <div className="flex items-center justify-between pt-1">
                      <span className="text-xs text-white/60">显示双语翻译对齐</span>
                      <button 
                        onClick={() => setPresetParams({...presetParams, showTranslation: !presetParams.showTranslation})}
                        className={`px-3 py-1.5 rounded-lg text-xs transition-colors ${
                          presetParams.showTranslation ? 'bg-white/10 text-white border border-white/20' : 'bg-neutral-800 text-neutral-400'
                        }`}
                      >
                        {presetParams.showTranslation ? '双语显示' : '仅主歌词'}
                      </button>
                    </div>
                  </div>
                </div>

                <div>
                  <span className="text-[11px] text-white/40 font-bold tracking-widest uppercase mb-3 block">动态粒子引擎 (高级)</span>
                  <div className="space-y-4 bg-neutral-900/40 p-4 rounded-2xl border border-neutral-900">
                    <div className="space-y-1.5">
                      <div className="flex justify-between text-xs">
                        <span className="text-white/60">漂浮粒子总数量 (Density)</span>
                        <span className="font-mono text-white/80">{presetParams.particleCount} 颗</span>
                      </div>
                      <input 
                        type="range" min="10" max="150" 
                        value={presetParams.particleCount}
                        onChange={(e) => setPresetParams({...presetParams, particleCount: Number(e.target.value)})}
                        className="w-full slider-thumb appearance-none bg-neutral-800 h-1 rounded"
                      />
                    </div>
                    <div className="space-y-1.5">
                      <div className="flex justify-between text-xs">
                        <span className="text-white/60">粒子向上喷薄速度 (Physics)</span>
                        <span className="font-mono text-white/80">{presetParams.particleSpeed.toFixed(1)}x</span>
                      </div>
                      <input 
                        type="range" min="0.1" max="4.0" step="0.1"
                        value={presetParams.particleSpeed}
                        onChange={(e) => setPresetParams({...presetParams, particleSpeed: Number(e.target.value)})}
                        className="w-full slider-thumb appearance-none bg-neutral-800 h-1 rounded"
                      />
                    </div>
                  </div>
                </div>

                <div className="text-[10px] text-center text-white/20">
                  Mineradio Mobile v1.2.0 • 渲染底层由 Canvas2D 驱动
                </div>
              </div>
            </div>

            {/* ==========================================
                --- [子抽屉 2] 搜索与点播 ---
                ========================================== */}
            <div 
              className={`absolute inset-0 z-50 bg-black/95 backdrop-blur-2xl transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] ${
                isSearchOpen ? 'translate-y-0 opacity-100' : 'translate-y-full opacity-0 pointer-events-none'
              } flex flex-col pt-14 px-6`}
            >
              <div className="flex items-center justify-between mb-6 shrink-0">
                <h2 className="text-xl font-bold tracking-wider flex items-center space-x-2">
                  <Search className="text-amber-400" size={20} />
                  <span>搜索点播库</span>
                </h2>
                <button 
                  onClick={() => setIsSearchOpen(false)} 
                  className="p-2 bg-white/5 rounded-full active:scale-90"
                >
                  <X size={18} />
                </button>
              </div>

              <div className="relative mb-6 shrink-0">
                <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-white/40" size={18} />
                <input 
                  type="text" 
                  placeholder="搜索歌曲、歌手或歌单..." 
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-white/30 outline-none focus:border-white/20 focus:bg-white/10 transition-all text-sm"
                />
              </div>

              <div className="flex-1 overflow-y-auto hide-scroll pb-10">
                <span className="text-[11px] text-white/40 font-bold tracking-widest uppercase block mb-4">
                  {searchQuery ? "搜索匹配结果" : "推荐热播歌单"}
                </span>

                <div className="space-y-3">
                  {EXPANDED_SEARCH_LIBRARY.filter(song => 
                    song.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                    song.artist.toLowerCase().includes(searchQuery.toLowerCase())
                  ).map((song) => (
                    <div 
                      key={song.id} 
                      onClick={() => playFromSearch(song)}
                      className="flex items-center p-3 bg-white/5 hover:bg-white/10 border border-white/5 rounded-2xl active:scale-95 transition-all cursor-pointer"
                    >
                      <img src={song.cover} alt={song.title} className="w-12 h-12 rounded-xl object-cover shadow-md" />
                      <div className="ml-4 flex-1 min-w-0">
                        <h4 className="text-sm font-semibold truncate text-white">{song.title}</h4>
                        <p className="text-white/50 text-xs mt-1 truncate">{song.artist}</p>
                      </div>
                      <Play size={16} className="text-white/50 mr-2" />
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* ==========================================
                --- [子抽屉 3] QQ 音乐登录提权交互 ---
                ========================================== */}
            <div 
              className={`absolute inset-x-0 bottom-0 z-50 bg-neutral-950/95 backdrop-blur-2xl rounded-t-[32px] border-t border-neutral-800 transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] ${
                isQQLoginOpen ? 'translate-y-0 h-[70%]' : 'translate-y-full h-0'
              } flex flex-col`}
            >
              <div className="w-full px-6 py-4 flex items-center justify-between border-b border-neutral-900 shrink-0">
                <h3 className="text-base font-bold flex items-center space-x-2">
                  <Radio className="text-green-400 animate-pulse" size={18} />
                  <span>QQ音乐登录 / 授权认证</span>
                </h3>
                <button 
                  onClick={() => setIsQQLoginOpen(false)}
                  className="p-2 bg-white/5 rounded-full hover:bg-white/10 active:scale-90 transition-all"
                >
                  <X size={18} />
                </button>
              </div>

              <div className="flex-1 overflow-y-auto px-6 py-5 space-y-6 hide-scroll pb-10">
                <div className="bg-gradient-to-r from-amber-500/10 to-orange-500/10 p-4 rounded-2xl border border-amber-500/20 text-xs leading-relaxed text-amber-200">
                  根据 <strong>Mineradio</strong> 的核心授权设计，如果您希望在移动端无缝拉取您在 QQ 音乐 APP 中点赞的、或创建的歌单，请完成以下两项操作之一：
                </div>

                <div className="space-y-2">
                  <span className="text-[11px] text-white/40 font-bold uppercase tracking-wider block">方案一：官方一键跳转授权</span>
                  <button 
                    onClick={handleQQRedirect}
                    className="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-black font-bold text-sm py-4 rounded-2xl flex items-center justify-center space-x-2 shadow-[0_4px_15px_rgba(16,185,129,0.3)] active:scale-95 transition-all"
                  >
                    <UserCircle size={18} />
                    <span>一键跳转到 QQ 音乐完成登录</span>
                  </button>
                </div>

                <div className="space-y-3 pt-2">
                  <span className="text-[11px] text-white/40 font-bold uppercase tracking-wider block">方案二：注入本地专属 Cookie</span>
                  <div className="space-y-1.5">
                    <div className="relative">
                      <input 
                        type={showCookie ? "text" : "password"} 
                        placeholder="请输入/粘贴您的 QQ 音乐 Cookie (qm_keyst 等)" 
                        value={qqCookie}
                        onChange={(e) => setQqCookie(e.target.value)}
                        className="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 pl-4 pr-12 text-xs text-white outline-none focus:border-white/20"
                      />
                      <button 
                        onClick={() => setShowCookie(!showCookie)}
                        className="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white"
                      >
                        {showCookie ? <EyeOff size={16} /> : <Eye size={16} />}
                      </button>
                    </div>
                  </div>

                  <button 
                    onClick={submitQQAuth}
                    className="w-full bg-white text-black font-bold text-xs py-3.5 rounded-xl hover:bg-neutral-200 active:scale-95 transition-all"
                  >
                    验证并保存到本地安全沙箱
                  </button>
                </div>

                <div className="text-[10px] text-white/30 text-center leading-normal">
                  提示：Mineradio 不会上传您的任何登录凭证，所有凭证均保存在本地沙箱，仅与官方 API 进行网络请求。
                </div>
              </div>
            </div>

            {/* ==========================================
                --- [子抽屉 4] 3D 当前播放队列清单 ---
                ========================================== */}
            <div 
              className={`absolute inset-x-0 bottom-0 z-50 bg-neutral-950/95 backdrop-blur-2xl rounded-t-[32px] border-t border-neutral-800 transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] ${
                isPlaylistDrawerOpen ? 'translate-y-0 h-[65%]' : 'translate-y-full h-0'
              } flex flex-col`}
            >
              <div className="w-full px-6 py-4 flex items-center justify-between border-b border-neutral-900 shrink-0">
                <h3 className="text-base font-bold flex items-center space-x-2">
                  <Music className="text-purple-400" size={18} />
                  <span>当前播放架队列 ({playlist.length})</span>
                </h3>
                <button 
                  onClick={() => setIsPlaylistDrawerOpen(false)}
                  className="p-2 bg-white/5 rounded-full hover:bg-white/10 active:scale-90 transition-all"
                >
                  <X size={18} />
                </button>
              </div>

              <div className="flex-1 overflow-y-auto px-6 py-4 space-y-3 hide-scroll pb-10">
                {playlist.map((song, idx) => {
                  const isActive = idx === currentIndex;
                  return (
                    <div 
                      key={song.id + "_" + idx}
                      onClick={() => {
                        setCurrentIndex(idx);
                        setProgress(0);
                        setIsPlaying(true);
                      }}
                      className={`flex items-center p-3 rounded-2xl cursor-pointer transition-all ${
                        isActive ? 'bg-white/10 border border-white/10' : 'hover:bg-white/5 border border-transparent'
                      }`}
                    >
                      <img src={song.cover} alt={song.title} className="w-10 h-10 rounded-lg object-cover" />
                      <div className="ml-4 flex-1 min-w-0">
                        <h4 className={`text-xs font-semibold truncate ${isActive ? 'text-amber-300' : 'text-white'}`}>
                          {song.title}
                        </h4>
                        <p className="text-[10px] text-white/40 mt-1">{song.artist}</p>
                      </div>
                      {isActive && <span className="text-[10px] text-amber-300 font-mono tracking-widest">播放中</span>}
                    </div>
                  );
                })}
              </div>
            </div>

          </div>
        </div>
      );
    }

    // 渲染 React 节点
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
